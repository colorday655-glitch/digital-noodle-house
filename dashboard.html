<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无人面馆 - 实时监控中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0f0f1a 100%);
            min-height: 100vh;
            color: #00ff88;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(0, 255, 136, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 150, 255, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 42px;
            text-transform: uppercase;
            letter-spacing: 8px;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
            margin-bottom: 10px;
        }

        .subtitle {
            color: rgba(0, 255, 136, 0.6);
            font-size: 14px;
            letter-spacing: 4px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 60px;
        }

        .stat-card {
            background: rgba(0, 20, 10, 0.6);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 10px;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #00ff88, transparent);
            animation: scan-line 2s linear infinite;
        }

        @keyframes scan-line {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .stat-card:hover {
            border-color: rgba(0, 255, 136, 0.6);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.1);
        }

        .stat-card.warning {
            border-color: rgba(255, 165, 0, 0.4);
        }

        .stat-card.warning::before {
            background: linear-gradient(90deg, transparent, #ffa500, transparent);
        }

        .stat-card.danger {
            border-color: rgba(255, 50, 50, 0.4);
        }

        .stat-card.danger::before {
            background: linear-gradient(90deg, transparent, #ff3232, transparent);
        }

        .stat-label {
            font-size: 14px;
            color: rgba(0, 255, 136, 0.6);
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .stat-value {
            font-size: 56px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .stat-unit {
            font-size: 18px;
            color: rgba(0, 255, 136, 0.6);
            margin-left: 10px;
        }

        .stat-sub {
            font-size: 12px;
            color: rgba(0, 255, 136, 0.4);
            margin-top: 15px;
        }

        .server-info {
            background: rgba(0, 20, 10, 0.6);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 10px;
            padding: 40px;
        }

        .server-title {
            font-size: 18px;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            font-size: 12px;
            color: rgba(0, 255, 136, 0.5);
            margin-bottom: 8px;
        }

        .info-value {
            font-size: 20px;
            color: #00ff88;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff88;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 10px #00ff88; }
            50% { opacity: 0.5; box-shadow: 0 0 5px #00ff88; }
        }

        .status-dot.warning {
            background: #ffa500;
        }

        .status-dot.danger {
            background: #ff3232;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            color: rgba(0, 255, 136, 0.3);
            font-size: 12px;
        }

        @media (max-width: 900px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .info-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    
    <div class="container">
        <header>
            <h1>Digital Noodle House</h1>
            <div class="subtitle">实时监控中心 /// REAL-TIME MONITORING</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card" id="cpuCard">
                <div class="stat-label">CPU 使用率</div>
                <div class="stat-value" id="cpuValue">--<span class="stat-unit">%</span></div>
                <div class="stat-sub" id="cpuSub">正在获取数据...</div>
            </div>

            <div class="stat-card" id="orderCard">
                <div class="stat-label">今日订单总数</div>
                <div class="stat-value" id="orderValue">--<span class="stat-unit">单</span></div>
                <div class="stat-sub" id="orderSub">实时更新</div>
            </div>

            <div class="stat-card" id="uptimeCard">
                <div class="stat-label">系统运行耗时</div>
                <div class="stat-value" id="uptimeValue">--<span class="stat-unit">天</span></div>
                <div class="stat-sub" id="uptimeSub">自系统启动</div>
            </div>
        </div>

        <div class="server-info">
            <div class="server-title">
                <span class="status-dot" id="statusDot"></span>
                服务器状态 / SERVER STATUS
            </div>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">主机名</div>
                    <div class="info-value" id="hostname">--</div>
                </div>
                <div class="info-item">
                    <div class="info-label">内存使用</div>
                    <div class="info-value" id="memory">--</div>
                </div>
                <div class="info-item">
                    <div class="info-label">负载均值</div>
                    <div class="info-value" id="load">--</div>
                </div>
                <div class="info-item">
                    <div class="info-label">在线人数</div>
                    <div class="info-value" id="connections">--</div>
                </div>
            </div>
        </div>

        <footer>
            更新间隔: 5秒 /// 系统版本: v1.0.0
        </footer>
    </div>

    <script>
        let startTime = Date.now();
        
        async function fetchStats() {
            try {
                const response = await fetch('http://173.254.206.13:8888/api/stats');
                const data = await response.json();
                
                document.getElementById('cpuValue').innerHTML = data.cpu + '<span class="stat-unit">%</span>';
                document.getElementById('memory').textContent = data.memory;
                document.getElementById('load').textContent = data.load;
                document.getElementById('connections').textContent = data.connections;
                document.getElementById('hostname').textContent = data.hostname;
                document.getElementById('orderValue').innerHTML = data.orders + '<span class="stat-unit">单</span>';
                
                const days = Math.floor(data.uptime / 86400);
                const hours = Math.floor((data.uptime % 86400) / 3600);
                document.getElementById('uptimeValue').innerHTML = (days > 0 ? days + '天 ' : '') + hours + '<span class="stat-unit">时</span>';
                document.getElementById('uptimeSub').textContent = '累计: ' + data.uptimeFormatted;
                
                const cpuCard = document.getElementById('cpuCard');
                cpuCard.classList.remove('warning', 'danger');
                if (data.cpu > 80) {
                    cpuCard.classList.add('danger');
                } else if (data.cpu > 60) {
                    cpuCard.classList.add('warning');
                }
                
                const statusDot = document.getElementById('statusDot');
                statusDot.classList.remove('warning', 'danger');
                if (data.cpu > 80) {
                    statusDot.classList.add('danger');
                } else if (data.cpu > 60) {
                    statusDot.classList.add('warning');
                }
                
            } catch (e) {
                console.error('获取数据失败:', e);
                document.getElementById('cpuSub').textContent = '连接异常';
            }
        }
        
        fetchStats();
        setInterval(fetchStats, 5000);
    </script>
</body>
</html>
