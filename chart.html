<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无人面馆 - 订单高峰时段统计</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0f0f1a 100%);
            min-height: 100vh;
            color: #fff;
            padding: 40px 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 36px; color: #00ff88; margin-bottom: 10px; }
        .subtitle { color: rgba(255,255,255,0.5); font-size: 14px; }
        
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .card {
            background: rgba(0,255,136,0.1);
            border: 1px solid rgba(0,255,136,0.2);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
        }
        .card-value { font-size: 32px; font-weight: bold; color: #00ff88; }
        .card-label { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 8px; }
        
        .chart-container {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 40px;
        }
        .chart-title { font-size: 18px; margin-bottom: 25px; color: #00ff88; }
        
        .chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            height: 250px;
            padding: 0 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .bar-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            margin: 0 2px;
        }
        .bar {
            width: 100%;
            max-width: 30px;
            background: linear-gradient(to top, #00ff88, #00cc6a);
            border-radius: 4px 4px 0 0;
            transition: all 0.3s;
            position: relative;
            min-height: 5px;
        }
        .bar:hover { transform: scaleY(1.05); box-shadow: 0 0 20px rgba(0,255,136,0.5); }
        .bar.peak { background: linear-gradient(to top, #ff6b6b, #ee5a5a); }
        .bar.high { background: linear-gradient(to top, #ffd93d, #f0c929); }
        .bar-label {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            margin-top: 8px;
            writing-mode: vertical-lr;
            transform: rotate(180deg);
            height: 40px;
        }
        .bar-value {
            font-size: 11px;
            color: #00ff88;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .insights {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .insight-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 25px;
        }
        .insight-title { 
            font-size: 14px; 
            color: #00ff88; 
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .insight-content { font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.8; }
        
        footer {
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            margin-top: 40px;
        }
        footer a { color: #00ff88; text-decoration: none; }
        
        @media (max-width: 768px) {
            .stats-cards { grid-template-columns: repeat(2, 1fr); }
            .insights { grid-template-columns: 1fr; }
            .bar-label { writing-mode: horizontal-tb; transform: none; height: auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🍜 张大爷无人面馆</h1>
            <div class="subtitle">本周订单高峰时段统计 /// WEEKLY PEAK HOURS ANALYSIS</div>
        </header>

        <div class="stats-cards">
            <div class="card">
                <div class="card-value" id="totalOrders">913</div>
                <div class="card-label">本周总订单</div>
            </div>
            <div class="card">
                <div class="card-value" id="peakHour">19:00</div>
                <div class="card-label">最高峰时段</div>
            </div>
            <div class="card">
                <div class="card-value" id="avgDaily">130</div>
                <div class="card-label">日均订单</div>
            </div>
            <div class="card">
                <div class="card-value" id="nightOrders">233</div>
                <div class="card-label">深夜订单(22-2点)</div>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-title">📊 24小时订单分布</div>
            <div class="chart" id="chart"></div>
        </div>

        <div class="insights">
            <div class="insight-card">
                <div class="insight-title">🔥 午餐高峰</div>
                <div class="insight-content">
                    11:00 - 13:00<br>
                    上班族点餐高峰<br>
                    平均每小时 77 单
                </div>
            </div>
            <div class="insight-card">
                <div class="insight-title">⭐ 晚餐高峰</div>
                <div class="insight-content">
                    18:00 - 20:00<br>
                    下班回家用餐高峰<br>
                    平均每小时 102 单
                </div>
            </div>
            <div class="insight-card">
                <div class="insight-title">🌙 深夜高峰</div>
                <div class="insight-content">
                    22:00 - 02:00<br>
                    夜宵时刻，年轻人最爱<br>
                    平均每小时 58 单
                </div>
            </div>
        </div>

        <footer>
            实时监控: <a href="/digital-noodle-house/dashboard.html">查看仪表盘</a>
        </footer>
    </div>

    <script>
        // 模拟数据
        const mockData = {
            0: 58, 1: 57, 2: 11, 3: 11, 4: 9, 5: 11,
            6: 14, 7: 8, 8: 9, 9: 11, 10: 8,
            11: 76, 12: 73, 13: 84, 14: 14, 15: 7, 16: 8, 17: 11,
            18: 96, 19: 109, 20: 102, 21: 8,
            22: 57, 23: 61
        };

        const maxValue = Math.max(...Object.values(mockData));
        const chart = document.getElementById('chart');

        for (let hour = 0; hour < 24; hour++) {
            const value = mockData[hour];
            const height = (value / maxValue) * 100;
            
            let barClass = 'bar';
            if (value === maxValue) barClass += ' peak';
            else if (value >= maxValue * 0.8) barClass += ' high';

            const container = document.createElement('div');
            container.className = 'bar-container';
            container.innerHTML = `
                <div class="bar-value">${value}</div>
                <div class="${barClass}" style="height: ${height}%"></div>
                <div class="bar-label">${hour.toString().padStart(2, '0')}:00</div>
            `;
            chart.appendChild(container);
        }

        // 更新统计数据
        const total = Object.values(mockData).reduce((a, b) => a + b, 0);
        document.getElementById('totalOrders').textContent = total;
        document.getElementById('avgDaily').textContent = Math.round(total / 7);
        document.getElementById('nightOrders').textContent = mockData[22] + mockData[23] + mockData[0] + mockData[1];
    </script>
</body>
</html>
